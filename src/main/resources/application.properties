# ===================== SERVIDOR =====================
server.port=8080
server.servlet.context-path=/

# ===================== BANCO DE DADOS (PostgreSQL) =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/higienizaplus
spring.datasource.username=higienizaplus_user
spring.datasource.password=troque_esta_senha
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / HIBERNATE =====================
# validate: o Flyway controla o schema, o Hibernate so confere se bate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================== FLYWAY (migrations) =====================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================== JWT =====================
# IMPORTANTE: troque este segredo em produção (string longa e aleatória, 256+ bits)
app.jwt.secret=TROQUE_ESTE_SEGREDO_POR_UM_VALOR_LONGO_E_ALEATORIO_EM_PRODUCAO_1234567890
app.jwt.expiration-ms=86400000

# ===================== ADMIN PADRAO (criado se nao existir) =====================
app.admin.default-username=admin
app.admin.default-password=MudeEstaSenha123!

# ===================== WHATSAPP =====================
app.whatsapp.numero=244949943236

# ===================== UPLOAD/CORS =====================
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000

# ===================== LOGGING =====================
logging.level.com.higienizaplus=INFO
logging.level.org.springframework.security=INFO
