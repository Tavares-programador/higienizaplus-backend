# ===================== SERVIDOR =====================
server.port=${PORT:8080}
server.servlet.context-path=/

# ===================== BANCO DE DADOS (PostgreSQL) =====================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/higienizaplus}
spring.datasource.username=${DATABASE_USERNAME:higienizaplus_user}
spring.datasource.password=${DATABASE_PASSWORD:troque_esta_senha}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================== FLYWAY (migrations) =====================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================== JWT =====================
app.jwt.secret=${JWT_SECRET:TROQUE_ESTE_SEGREDO_POR_UM_VALOR_LONGO_E_ALEATORIO_EM_PRODUCAO_1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================== ADMIN PADRAO (criado se nao existir) =====================
app.admin.default-username=${ADMIN_USERNAME:admin}
app.admin.default-password=${ADMIN_PASSWORD:MudeEstaSenha123!}

# ===================== WHATSAPP =====================
app.whatsapp.numero=${WHATSAPP_NUMERO:244949943236}

# ===================== UPLOAD/CORS =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,https://higieniza-site.vercel.app}

# ===================== LOGGING =====================
logging.level.com.higienizaplus=INFO
logging.level.org.springframework.security=INFO